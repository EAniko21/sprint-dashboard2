<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprint mérőszám dashboard</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body { font-family: system-ui, sans-serif; font-size: 13px; color: #1a1a18; background: #f5f5f2; margin: 0; padding: 0; }
.app { max-width: 820px; margin: 0 auto; padding: 16px; }
.card { background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.card-gradient { background: linear-gradient(135deg, #fafaf8, #f3f3ef); }
label { display: block; margin-bottom: 4px; font-weight: 500; font-size: 12px; color: #555; }
input, select { width: 100%; padding: 6px 10px; border-radius: 7px; border: 1px solid #d0d0cb; font-size: 13px; font-family: inherit; }
.btn { padding: 8px 20px; border-radius: 8px; border: none; background: #1a1a18; color: #fff; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; }
.btn-sm { padding: 4px 12px; border-radius: 6px; border: 1px solid #d0d0cb; background: #fff; cursor: pointer; font-size: 12px; font-family: inherit; }
.btn-accent { padding: 6px 14px; border-radius: 7px; border: none; background: #059669; color: #fff; cursor: pointer; font-size: 12px; font-weight: 500; font-family: inherit; }
.btn:hover { background: #333; }
.btn-sm:hover { background: #f5f5f2; }
.btn-accent:hover { background: #047857; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.col { flex: 1; min-width: 160px; }
.section-title { font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; margin-top: 16px; border-bottom: 1px solid #f0f0ec; padding-bottom: 4px; }
.sub-title { font-size: 11px; font-weight: 600; color: #999; margin-bottom: 6px; margin-top: 10px; }
.rag-green { background: #d1fae5; color: #065f46; border-radius: 6px; padding: 2px 10px; font-weight: 600; font-size: 13px; }
.rag-amber { background: #fef3c7; color: #92400e; border-radius: 6px; padding: 2px 10px; font-weight: 600; font-size: 13px; }
.rag-red   { background: #fee2e2; color: #991b1b; border-radius: 6px; padding: 2px 10px; font-weight: 600; font-size: 13px; }
.ko-badge  { background: #1a1a18; color: #fff; border-radius: 6px; padding: 2px 10px; font-weight: 700; font-size: 12px; letter-spacing: 0.5px; }
.warn-badge { background: #fee2e2; color: #991b1b; border-radius: 6px; padding: 3px 10px; font-size: 12px; font-weight: 600; display: inline-block; }
.bonus-badge { background: #d1fae5; color: #065f46; border-radius: 6px; padding: 2px 10px; font-weight: 600; font-size: 12px; }
.pillar-bar { height: 6px; border-radius: 3px; margin-top: 3px; }
.tab-btn { padding: 6px 15px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,.3); background: #fff; color: #73726c; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; }
.tab-btn.active { background: #1a1a18; color: #fff; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; padding: 4px 6px; color: #888; font-weight: 500; white-space: nowrap; border-bottom: 1px solid #eee; }
td { padding: 4px 6px; border-bottom: 1px solid #f3f3ef; vertical-align: middle; }
.hint { font-size: 11px; color: #999; margin-top: 2px; }
.hint-ko { font-size: 11px; color: #dc2626; margin-top: 2px; font-weight: 500; }
h1 { font-size: 18px; font-weight: 600; margin: 0; }
.subtitle { font-size: 12px; color: #73726c; margin-top: 3px; }
.score-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.score-cell { background: #f9f9f7; border-radius: 8px; padding: 8px 10px; }
.score-cell.ko-cell { background: #fef2f2; border: 1px solid #fecaca; }
.score-label { font-size: 11px; color: #666; margin-bottom: 2px; }
.score-val { font-weight: 700; font-size: 16px; }
.score-sub { font-size: 11px; color: #999; }
.fr-info { font-size: 12px; margin-bottom: 10px; background: #f9f9f7; border-radius: 6px; padding: 6px 10px; }
.uv-card { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 14px; margin-top: 14px; }
.uv-card .section-title { color: #15803d; border-bottom-color: #bbf7d0; }
.progress-bar-wrap { background: #e5e5e0; border-radius: 6px; height: 10px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 6px; transition: width .4s; }
.chart-wrap { position: relative; height: 220px; }
.ratio-display { font-size: 11px; margin-top: 3px; }
.ratio-ok { color: #059669; }
.ratio-bad { color: #dc2626; font-weight: 600; }
.sync-bar { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #888; margin-bottom: 10px; flex-wrap: wrap; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.sync-ok { background: #10b981; }
.sync-err { background: #ef4444; }
.sync-loading { background: #f59e0b; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.loading-overlay { text-align: center; padding: 40px; color: #888; font-size: 14px; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #e5e5e0; border-top-color: #1a1a18; border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Quarter selector */
.qtr-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; background: #fff; border: 1px solid #e5e5e0; border-radius: 10px; padding: 10px 14px; }
.qtr-label { font-size: 11px; color: #888; font-weight: 500; white-space: nowrap; }
.qtr-btn { padding: 4px 14px; border-radius: 6px; border: 1px solid #d0d0cb; background: #f9f9f7; cursor: pointer; font-size: 12px; font-family: inherit; white-space: nowrap; }
.qtr-btn.active { background: #1a1a18; color: #fff; border-color: #1a1a18; font-weight: 600; }
.qtr-btn:hover:not(.active) { background: #f0f0ec; }
.qtr-new-form { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.qtr-new-form input { width: 160px; flex: none; }
.past-badge { font-size: 10px; background: #f3f3ef; color: #888; border-radius: 4px; padding: 1px 6px; margin-left: 4px; }
</style>
</head>
<body>
<div class="app">
  <div style="margin-bottom:14px">
    <h1>Sprint mérőszám dashboard</h1>
    <div class="subtitle">Zafír &amp; Holdkő · 7 sprint/negyedév · Elvárás: 595/700 pont · Pénzes 30% · Termelés 20% · Elszám. 10% · Munkamin. 15% · Tervezés 10% · Feladatrend. 15%</div>
  </div>
  <div id="syncBar" class="sync-bar">
    <span class="sync-dot sync-loading"></span>
    <span id="syncStatus">Betöltés...</span>
  </div>
  <!-- Quarter selector -->
  <div class="qtr-bar" id="qtrBar">
    <span class="qtr-label">Negyedév:</span>
    <div id="qtrBtns" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center"></div>
    <div id="qtrNewArea" style="margin-left:auto"></div>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap" id="tabBar"></div>
  <div id="tabContent"><div class="loading-overlay"><span class="spinner"></span>Adatok betöltése...</div></div>
</div>
<script>
// ─── Global error trap ───────────────────────────────────────────────────────
window.onerror = function(msg, src, line, col, err) {
  const el = document.getElementById('tabContent') || document.body;
  el.innerHTML = '<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;padding:20px;color:#991b1b;font-size:13px"><strong>JavaScript hiba</strong><br>' + msg + '<br>Sor: ' + line + '<br>' + (err && err.stack ? '<pre style="font-size:11px;white-space:pre-wrap">' + err.stack + '</pre>' : '') + '</div>';
};

// ─── GitHub config ───────────────────────────────────────────────────────────
const GH_OWNER  = 'eaniko21';
const GH_REPO   = 'sprint-dashboard2';
const GH_FILE   = 'dashboard-data.json';
const GH_RAW    = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/${GH_FILE}`;
const GH_API    = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;
const LS_KEY    = 'sprint_dashboard_v7';
const LS_AUTH_KEY = 'sprint_dashboard_gh_auth';

function getGhToken() {
  try { return localStorage.getItem(LS_AUTH_KEY) || null; } catch { return null; }
}

function showAuthModal(onSuccess) {
  const existing = getGhToken() || '';
  const overlay = document.createElement('div');
  overlay.id = 'authOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:14px;padding:28px 28px 22px;max-width:420px;width:92%;box-shadow:0 8px 40px rgba(0,0,0,.18)">
      <div style="font-size:16px;font-weight:600;margin-bottom:6px">GitHub token megadása</div>
      <div style="font-size:12px;color:#777;margin-bottom:18px">A sprint adatok mentéséhez GitHub Personal Access Token szükséges. A token csak a te böngésződben tárolódik.</div>
      <label style="font-size:12px;font-weight:500;color:#555;display:block;margin-bottom:4px">GitHub Personal Access Token</label>
      <input id="authToken" type="password" placeholder="ghp_..." value="${existing}" style="width:100%;padding:8px 10px;border-radius:7px;border:1px solid #d0d0cb;font-size:13px;margin-bottom:6px">
      <div style="font-size:11px;color:#999;margin-bottom:18px">
        Token: <a href="https://github.com/settings/tokens/new" target="_blank" style="color:#059669">github.com/settings/tokens</a> · Classic token · Engedély: <strong>repo</strong>
      </div>
      <div id="authError" style="font-size:12px;color:#dc2626;margin-bottom:10px;display:none"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button onclick="document.getElementById('authOverlay').remove()" style="padding:8px 16px;border-radius:8px;border:1px solid #d0d0cb;background:#fff;cursor:pointer;font-size:13px">Mégsem</button>
        <button onclick="saveAuth()" style="padding:8px 20px;border-radius:8px;border:none;background:#1a1a18;color:#fff;cursor:pointer;font-size:13px;font-weight:500">Mentés</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  window._authOnSuccess = onSuccess;
  setTimeout(() => { const t = document.getElementById('authToken'); if (t) t.focus(); }, 50);
}

function saveAuth() {
  const token = (document.getElementById('authToken')?.value || '').trim();
  const errEl = document.getElementById('authError');
  if (!token) { errEl.textContent = 'Add meg a GitHub tokent.'; errEl.style.display='block'; return; }
  try { localStorage.setItem(LS_AUTH_KEY, token); } catch {}
  document.getElementById('authOverlay')?.remove();
  if (typeof window._authOnSuccess === 'function') window._authOnSuccess();
}

function ensureAuth(then) {
  if (getGhToken()) { then(); return; }
  showAuthModal(then);
}

// ─── GitHub I/O ───────────────────────────────────────────────────────────────
async function loadFromGitHub() {
  setSyncState('loading', 'Betöltés...');
  try {
    const resp = await fetch(GH_RAW + '?t=' + Date.now());
    if (resp.status === 404) {
      initDefaultQuarter();
      setSyncState('ok', 'Új – nincs még mentett adat');
      return;
    }
    if (!resp.ok) throw new Error('Betöltés sikertelen: ' + resp.status);
    const data = await resp.json();
    applyData(data);
    try { localStorage.setItem(LS_KEY, JSON.stringify({quartersData, activeQuarterKey})); } catch{}
    setSyncState('ok', 'Frissítve: ' + new Date().toLocaleTimeString('hu-HU'));
  } catch(e) {
    console.warn('GitHub betöltés sikertelen:', e);
    try { const v=localStorage.getItem(LS_KEY); if(v){const p=JSON.parse(v);quartersData=p.quartersData||{};activeQuarterKey=p.activeQuarterKey||'';} } catch{}
    if (!Object.keys(quartersData).length) initDefaultQuarter();
    setSyncState('error', e.message || 'Betöltés sikertelen – helyi adatok');
  }
}

async function saveToGitHub() {
  setSyncState('saving', 'Mentés...');
  try {
    const token = getGhToken();
    if (!token) { ensureAuth(() => saveToGitHub()); return; }
    const payload = JSON.stringify({quartersData, activeQuarterKey}, null, 2);
    const encoded = btoa(unescape(encodeURIComponent(payload)));
    let sha = '';
    const getResp = await fetch(GH_API, {
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' }
    });
    if (getResp.status === 401) { localStorage.removeItem(LS_AUTH_KEY); ensureAuth(() => saveToGitHub()); return; }
    if (getResp.ok) { const fd = await getResp.json(); sha = fd.sha || ''; }
    const body = { message: 'Sprint adatok frissítve', content: encoded };
    if (sha) body.sha = sha;
    const putResp = await fetch(GH_API, {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json' },
      body: JSON.stringify(body)
    });
    if (putResp.status === 401) { localStorage.removeItem(LS_AUTH_KEY); ensureAuth(() => saveToGitHub()); return; }
    if (!putResp.ok) { const err = await putResp.json().catch(()=>({})); throw new Error('Mentés: ' + (err.message || putResp.status)); }
    try { localStorage.setItem(LS_KEY, JSON.stringify({quartersData, activeQuarterKey})); } catch{}
    setSyncState('ok', 'Mentve: ' + new Date().toLocaleTimeString('hu-HU'));
  } catch(e) {
    setSyncState('error', 'Mentés sikertelen – ' + (e.message || 'ismeretlen hiba'));
  }
}


// ─── Konstansok ───────────────────────────────────────────────────────────────
const TOTAL_SPRINTS = 7;
const TARGET_POINTS = 595;
const MAX_POINTS    = 700;
const PENZES_CEL    = 30;
const TERMELES_CEL  = 60;
const WEIGHTS = { penzes:30, termeles:20, elszamolas:10, munkaminoseg:15, tervezes:10, feladatrendezettsg:15 };
const TEAM_CONFIG = {
  holdko: { label:'Holdkő', color:'#7F77DD' },
  zafir:  { label:'Zafír',  color:'#EF9F27' },
};

const QUARTER_ORDER = ['tavasz','nyar','osz','tel'];
const QUARTER_LABELS = { tavasz:'tavasz', nyar:'nyár', osz:'ősz', tel:'tél' };

// ─── State ────────────────────────────────────────────────────────────────────
let activeTab = 'holdko';
let compareChartInstance = null;
let quartersData = {};
let activeQuarterKey = '';
let newQtrMode = false;

function getActiveQtr() { return quartersData[activeQuarterKey] || { label:'–', hk:[], zf:[] }; }
function getHk() { return getActiveQtr().hk || []; }
function getZf() { return getActiveQtr().zf || []; }


function applyData(data) {
  if (!data) { initDefaultQuarter(); return; }
  // Új formátum: quartersData + activeQuarterKey
  if (data.quartersData) {
    quartersData = data.quartersData;
    activeQuarterKey = data.activeQuarterKey || Object.keys(data.quartersData)[0] || '';
    if (!Object.keys(quartersData).length) initDefaultQuarter();
    return;
  }
  // Migráció régi formátumból (hk/zf top-level)
  if (data.hk || data.zf) {
    const key = '2026-nyar';
    quartersData = { [key]: { label: '2026 nyár', hk: data.hk||[], zf: data.zf||[] } };
    activeQuarterKey = key;
    return;
  }
  initDefaultQuarter();
}

function initDefaultQuarter() {
  const key = '2026-nyar';
  quartersData = { [key]: { label: '2026 nyár', hk: [], zf: [] } };
  activeQuarterKey = key;
}

function sortedQuarterKeys() {
  // Sorrend: év növekvő, azon belül tavasz→nyár→ősz→tél
  return Object.keys(quartersData).sort((a,b) => {
    const [ayStr, as] = a.split('-'); const [byStr, bs] = b.split('-');
    const ay=parseInt(ayStr)||0, by=parseInt(byStr)||0;
    if (ay!==by) return ay-by;
    return (QUARTER_ORDER.indexOf(as)||99) - (QUARTER_ORDER.indexOf(bs)||99);
  });
}

function makeQuarterKey(year, season) { return `${year}-${season}`; }

function makeQuarterLabel(year, season) {
  return `${year} ${QUARTER_LABELS[season]||season}`;
}

function nextQuarterSuggestion() {
  const keys = sortedQuarterKeys();
  if (!keys.length) return { year: new Date().getFullYear(), season: 'nyar' };
  const last = keys[keys.length-1];
  const [yStr, s] = last.split('-');
  const y = parseInt(yStr)||new Date().getFullYear();
  const idx = QUARTER_ORDER.indexOf(s);
  if (idx === -1 || idx === QUARTER_ORDER.length-1) return { year: y+1, season: QUARTER_ORDER[0] };
  return { year: y, season: QUARTER_ORDER[idx+1] };
}

function extractBodyText(raw) {
  if (!raw) return '';
  if (typeof raw.body === 'string') return raw.body;
  if (raw.body && typeof raw.body === 'object') return JSON.stringify(raw.body);
  return JSON.stringify(raw);
}

function extractJson(text) {
  const codeMatch = text.match(/```(?:json)?\s*\n?([\s\S]*?)\n?```/);
  if (codeMatch) { try { return JSON.parse(codeMatch[1].trim()); } catch{} }
  const idx = text.indexOf('"quartersData"');
  const idx2 = text.indexOf('"hk"');
  const startIdx = idx > -1 ? idx : idx2;
  if (startIdx > -1) {
    const start = text.lastIndexOf('{', startIdx);
    if (start > -1) {
      let depth=0, end=-1;
      for (let i=start; i<text.length; i++) {
        if (text[i]==='{') depth++;
        else if (text[i]==='}') { depth--; if (depth===0){end=i;break;} }
      }
      if (end>-1) { try { return JSON.parse(text.slice(start,end+1)); } catch{} }
    }
  }
  return null;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setSyncState(state, msg) {
  const dot = document.querySelector('.sync-dot');
  const status = document.getElementById('syncStatus');
  if (!dot || !status) return;
  dot.className = 'sync-dot ' + (state==='ok'?'sync-ok':state==='error'?'sync-err':'sync-loading');
  status.textContent = msg;
}

// ─── Score számítás ───────────────────────────────────────────────────────────
function calcScore(d) {
  let scores = {}, ko = {};

  // 1. Pénzes arány (30%)
  const penzesAny = parseFloat(d.penzesAny)||0;
  const penzesTerv = parseFloat(d.penzesTerv)||PENZES_CEL;
  scores.penzes = Math.min(100, Math.round((penzesTerv>0 ? penzesAny/penzesTerv : 0)*100));

  // 2. Termelés/támogatás (20%)
  const termAny = parseFloat(d.termelesTamAny)||0;
  const termTerv = parseFloat(d.termelesTamTerv)||TERMELES_CEL;
  const autoPiros = termAny < 60;
  scores.termeles = Math.min(100, Math.round((termTerv>0 ? termAny/termTerv : 0)*100));

  // 3. Elszámolási fegyelem (10%)
  const kesDb    = parseInt(d.kesedelmasElszamolasDb)||0;
  const szamlaDb = parseInt(d.szamlaKesedelemDb)||0;
  let elszScore = 100;
  ko.elszamolas = kesDb >= 2 || szamlaDb >= 2;
  if (ko.elszamolas) { elszScore = 0; } else {
    if (kesDb === 1)    elszScore -= 50;
    if (szamlaDb === 1) elszScore -= 50;
  }
  scores.elszamolas = Math.max(0, elszScore);

  // 4. Munkaminőség (15%)
  const bevDb80  = parseInt(d.bevDb80)||0;
  const bevDb60  = parseInt(d.bevDb60)||0;
  const suppDb80 = parseInt(d.suppDb80)||0;
  let mkScore = 100;
  ko.munkaminoseg = bevDb60 >= 1 || bevDb80 >= 3;
  if (ko.munkaminoseg) { mkScore = 0; } else if (bevDb80 >= 1) { mkScore -= 50; }
  if (!ko.munkaminoseg) {
    if (suppDb80 >= 3) { mkScore = 0; ko.munkaminoseg = true; }
    else if (suppDb80 >= 1) { mkScore = Math.max(0, mkScore - 50); }
  }
  scores.munkaminoseg = mkScore;

  // 5. Tervezési pontosság (10%)
  const kiemelt         = d.kiemeltElNemKeszult === 'igen';
  const tervezettOssz   = parseFloat(d.tervezettOsszesen)||0;
  const kikerultOra     = parseFloat(d.kikerultOra)||0;
  const elNemKeszultOra = parseFloat(d.elNemKeszultOra)||0;
  let tervScore = 100;
  let kikerultRatio = 0, elNemRatio = 0;
  ko.tervezes = kiemelt;
  if (ko.tervezes) { tervScore = 0; } else if (tervezettOssz > 0) {
    kikerultRatio = kikerultOra / tervezettOssz;
    elNemRatio    = elNemKeszultOra / tervezettOssz;
    if (kikerultRatio > 0.10) tervScore -= 50;
    if (elNemRatio    > 0.10) tervScore -= 50;
    tervScore = Math.max(0, tervScore);
  }
  scores.tervezes = tervScore;

  // 6. Feladatrendezettség (15%)
  let hp = 0;
  hp += parseInt(d.lejaFeldolg)||0;
  if ((parseInt(d.lejaFelug)||0) > 25)    hp += 1;
  if (d.lejaMegoldasi === 'igen')          hp += 2;
  if ((parseInt(d.lejaMegkezdett)||0) > 25) hp += 1;
  if ((parseInt(d.lejaBetery)||0) > 3)    hp += 1;
  hp += parseInt(d.projKeres)||0;
  if (d.problemaSurgeto === 'igen')        hp += 2;
  if ((parseFloat(d.naptarKocka)||0) < 90 && d.naptarKocka !== '' && d.naptarKocka !== undefined) hp += 1;

  ko.feladatrendezettsg = hp >= 4;
  scores.feladatrendezettsg = hp === 0 ? 100 : hp <= 3 ? 50 : 0;

  // Összesített
  const rawTotal = Math.round(
    Math.min(100,scores.penzes)             * WEIGHTS.penzes/100 +
    Math.min(100,scores.termeles)           * WEIGHTS.termeles/100 +
    Math.min(100,scores.elszamolas)         * WEIGHTS.elszamolas/100 +
    Math.min(100,scores.munkaminoseg)       * WEIGHTS.munkaminoseg/100 +
    Math.min(100,scores.tervezes)           * WEIGHTS.tervezes/100 +
    Math.min(100,scores.feladatrendezettsg) * WEIGHTS.feladatrendezettsg/100
  );

  const uvKorrekcioPct = parseFloat(d.uvKorrekcioPct)||0;
  const total = Math.min(100, Math.max(0, rawTotal + uvKorrekcioPct));
  const rag = autoPiros ? 'red' : total>=85 ? 'green' : total>=70 ? 'amber' : 'red';

  return { scores, total, rawTotal, uvKorrekcioPct, rag, autoPiros, hibapontok:hp,
           ko, kikerultRatio, elNemRatio, uvKivel:d.uvKivel, uvMegjegyzes:d.uvMegjegyzes };
}

// ─── Live pillar status (for section title coloring) ─────────────────────────
function livePillarStatus(f) {
  const s = {};

  // Pénzes – arányos, nincs KO
  const pAny = parseFloat(f.penzesAny), pTerv = parseFloat(f.penzesTerv)||30;
  if (f.penzesAny === '' || f.penzesAny === undefined || isNaN(pAny)) { s.penzes = 'neutral'; }
  else { const r = pTerv>0 ? pAny/pTerv*100 : 0; s.penzes = r>=85?'green':r>=70?'amber':'red'; }

  // Termelés – <60% auto piros, arányos
  const tAny = parseFloat(f.termelesTamAny);
  if (f.termelesTamAny === '' || f.termelesTamAny === undefined || isNaN(tAny)) { s.termeles = 'neutral'; }
  else { const tTerv=parseFloat(f.termelesTamTerv)||60; const r=tTerv>0?tAny/tTerv*100:0; s.termeles = tAny<60?'red':r>=85?'green':'amber'; }

  // Elszámolás
  const kesDb = parseInt(f.kesedelmasElszamolasDb)||0, szDb = parseInt(f.szamlaKesedelemDb)||0;
  s.elszamolas = (kesDb>=2||szDb>=2) ? 'red' : (kesDb>=1||szDb>=1) ? 'amber' : 'green';

  // Munkaminőség
  const bev80 = parseInt(f.bevDb80)||0, bev60 = parseInt(f.bevDb60)||0, supp = parseInt(f.suppDb80)||0;
  s.munkaminoseg = (bev60>=1||bev80>=3||supp>=3) ? 'red' : (bev80>=1||supp>=1) ? 'amber' : 'green';

  // Tervezés
  const kiemelt = f.kiemeltElNemKeszult === 'igen';
  const tOssz = parseFloat(f.tervezettOsszesen)||0;
  const kR = tOssz>0?(parseFloat(f.kikerultOra)||0)/tOssz:0;
  const eR = tOssz>0?(parseFloat(f.elNemKeszultOra)||0)/tOssz:0;
  s.tervezes = kiemelt ? 'red' : (kR>0.10||eR>0.10) ? 'amber' : 'green';

  // Feladatrendezettség
  let hp = 0;
  hp += parseInt(f.lejaFeldolg)||0;
  if ((parseInt(f.lejaFelug)||0)>25)     hp+=1;
  if (f.lejaMegoldasi==='igen')           hp+=2;
  if ((parseInt(f.lejaMegkezdett)||0)>25) hp+=1;
  if ((parseInt(f.lejaBetery)||0)>3)     hp+=1;
  hp += parseInt(f.projKeres)||0;
  if (f.problemaSurgeto==='igen')         hp+=2;
  if ((parseFloat(f.naptarKocka)||0)<90 && f.naptarKocka!==''&&f.naptarKocka!==undefined) hp+=1;
  s.feladatrendezettsg = hp>=4 ? 'red' : hp>=1 ? 'amber' : 'green';

  return s;
}

function sectionTitleHtml(text, st, extraInfo) {
  const cfg = {
    green:   { bg:'#f0fdf4', bl:'#10b981', tc:'#065f46', label:'✓ OK' },
    amber:   { bg:'#fffbeb', bl:'#f59e0b', tc:'#92400e', label:'−50%' },
    red:     { bg:'#fef2f2', bl:'#ef4444', tc:'#991b1b', label:'KO / 0%' },
    neutral: { bg:'transparent', bl:'#e5e5e0', tc:'#666',  label:'' },
  }[st] || { bg:'transparent', bl:'#e5e5e0', tc:'#666', label:'' };
  const badge = cfg.label ? `<span style="font-size:11px;font-weight:700;color:${cfg.tc}">${cfg.label}${extraInfo?' · '+extraInfo:''}</span>` : '';
  return `<div style="display:flex;justify-content:space-between;align-items:center;background:${cfg.bg};border-left:3px solid ${cfg.bl};padding:5px 10px;border-radius:6px;margin-top:16px;margin-bottom:8px">
    <span style="font-size:12px;font-weight:600;color:${cfg.tc};text-transform:uppercase;letter-spacing:.5px">${text}</span>
    ${badge}
  </div>`;
}

function getLastGongyolt(history) {
  if (!history.length) return { penzes:null, termeles:null };
  const last = history[history.length-1];
  const p=parseFloat(last.penzesGongyolt), t=parseFloat(last.termelesTamGongyolt);
  return { penzes:isNaN(p)?null:p, termeles:isNaN(t)?null:t };
}

// ─── HTML helpers ─────────────────────────────────────────────────────────────
function ragHtml(rag) {
  if (rag==='green') return '<span class="rag-green">● Zöld</span>';
  if (rag==='amber') return '<span class="rag-amber">● Sárga</span>';
  return '<span class="rag-red">● Piros</span>';
}
function scoreColor(v) { return v>=80?'#059669':v>=60?'#d97706':'#dc2626'; }
function selHtml(name,val) {
  return `<select data-field="${name}"><option value="nem"${val==='nem'?' selected':''}>Nem</option><option value="igen"${val==='igen'?' selected':''}>Igen</option></select>`;
}
function numHtml(name,val,min) {
  return `<input type="number" min="${min??0}" data-field="${name}" value="${val??0}">`;
}
function decHtml(name,val,min) {
  return `<input type="number" min="${min??0}" step="0.01" data-field="${name}" value="${val??0}">`;
}
function txtHtml(name,val,ph) {
  return `<input type="text" data-field="${name}" value="${escAttr(val||'')}" placeholder="${ph||''}">`;
}
function escAttr(s) { return String(s).replace(/"/g,'&quot;'); }
function fld(lbl,inp,hint,hintClass) {
  return `<div class="col"><label>${lbl}</label>${inp}${hint?`<div class="${hintClass||'hint'}">${hint}</div>`:''}</div>`;
}

// ─── Quarter bar ──────────────────────────────────────────────────────────────
function renderQtrBar() {
  const keys = sortedQuarterKeys();
  const btns = document.getElementById('qtrBtns');
  const newArea = document.getElementById('qtrNewArea');

  btns.innerHTML = keys.map(k => {
    const q = quartersData[k];
    const isActive = k === activeQuarterKey;
    const isPast = !isActive && keys.indexOf(k) < keys.indexOf(activeQuarterKey);
    return `<button class="qtr-btn${isActive?' active':''}" data-qtr="${k}">${q.label}${isPast?'<span class="past-badge">múlt</span>':''}</button>`;
  }).join('');

  if (newQtrMode) {
    const sug = nextQuarterSuggestion();
    newArea.innerHTML = `
      <div class="qtr-new-form">
        <span style="font-size:11px;color:#555;white-space:nowrap">Új negyedév:</span>
        <input id="newQtrYear" type="number" value="${sug.year}" min="2020" max="2040" style="width:70px">
        <select id="newQtrSeason" style="width:90px">
          ${QUARTER_ORDER.map(s=>`<option value="${s}"${s===sug.season?' selected':''}>${QUARTER_LABELS[s]}</option>`).join('')}
        </select>
        <button class="btn-accent" id="btnCreateQtr">Létrehozás</button>
        <button class="btn-sm" id="btnCancelQtr">✕</button>
      </div>`;
  } else {
    newArea.innerHTML = `<button class="btn-sm" id="btnNewQtr">+ Új negyedév</button>`;
  }

  // Events
  btns.onclick = e => {
    const k = e.target.closest('[data-qtr]')?.dataset.qtr;
    if (k && k !== activeQuarterKey) {
      activeQuarterKey = k;
      forms = { holdko:{...emptyForm}, zafir:{...emptyForm} };
      lastResults = { holdko:null, zafir:null };
      render();
    }
  };

  const btnNew = document.getElementById('btnNewQtr');
  if (btnNew) btnNew.onclick = () => { newQtrMode = true; renderQtrBar(); };

  const btnCancel = document.getElementById('btnCancelQtr');
  if (btnCancel) btnCancel.onclick = () => { newQtrMode = false; renderQtrBar(); };

  const btnCreate = document.getElementById('btnCreateQtr');
  if (btnCreate) btnCreate.onclick = () => {
    const year = parseInt(document.getElementById('newQtrYear').value);
    const season = document.getElementById('newQtrSeason').value;
    if (!year || !season) return;
    const key = makeQuarterKey(year, season);
    if (quartersData[key]) { alert('Ez a negyedév már létezik.'); return; }
    quartersData[key] = { label: makeQuarterLabel(year, season), hk: [], zf: [] };
    activeQuarterKey = key;
    newQtrMode = false;
    forms = { holdko:{...emptyForm}, zafir:{...emptyForm} };
    lastResults = { holdko:null, zafir:null };
    saveToGitHub();
    render();
  };
}

// ─── CompareTab ───────────────────────────────────────────────────────────────
function renderCompareTab() {
  const hkH = getHk(), zfH = getZf();
  const qtrLabel = getActiveQtr().label;
  if (!hkH.length && !zfH.length) return `<div style="color:#888;padding:20px">Még nincs mentett sprint a(z) <strong>${qtrLabel}</strong> negyedévben.</div>`;
  const hkAvg = getLastGongyolt(hkH), zfAvg = getLastGongyolt(zfH);
  const rows = [['🟣 Holdkő',hkAvg],['🟠 Zafír',zfAvg]].map(([lbl,avg])=>`
    <tr>
      <td style="font-weight:600">${lbl}</td>
      <td style="font-weight:600;color:${avg.penzes!==null&&avg.penzes<PENZES_CEL?'#dc2626':'#059669'}">${avg.penzes!==null?avg.penzes+'%':'–'}</td>
      <td style="color:#888">${PENZES_CEL}%</td>
      <td>${avg.penzes!==null?(avg.penzes<PENZES_CEL?'<span class="warn-badge">⚠ Cél alatt</span>':'<span class="rag-green" style="font-size:11px">● OK</span>'):''}</td>
      <td style="font-weight:600;color:${avg.termeles!==null&&avg.termeles<TERMELES_CEL?'#dc2626':'#059669'}">${avg.termeles!==null?avg.termeles+'%':'–'}</td>
      <td style="color:#888">${TERMELES_CEL}%</td>
      <td>${avg.termeles!==null?(avg.termeles<TERMELES_CEL?'<span class="warn-badge">⚠ Cél alatt</span>':'<span class="rag-green" style="font-size:11px">● OK</span>'):''}</td>
    </tr>`).join('');
  return `
  <div class="card">
    <div style="font-weight:600;margin-bottom:4px">Sprint score összehasonlítás – <span style="color:#888;font-weight:400">${qtrLabel}</span></div>
    <div class="chart-wrap" style="margin-top:10px"><canvas id="compareChart"></canvas></div>
    <div style="display:flex;gap:16px;margin-top:8px;font-size:12px">
      <span style="color:#7F77DD;font-weight:600">● Holdkő</span>
      <span style="color:#EF9F27;font-weight:600">● Zafír</span>
      <span style="color:#dc2626">— Elvárás (85)</span>
    </div>
  </div>
  <div class="card">
    <div style="font-weight:600;margin-bottom:10px">Göngyölt tény értékek (legutóbbi sprint alapján)</div>
    <table>
      <thead><tr>${['','Göngyölt pénzes tény','Cél','Státusz','Göngyölt termelés/tám. tény','Cél','Státusz'].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function initChart() {
  const ctx = document.getElementById('compareChart'); if (!ctx) return;
  if (compareChartInstance) { compareChartInstance.destroy(); compareChartInstance=null; }
  const hkH=getHk(), zfH=getZf();
  const maxLen = Math.max(hkH.length, zfH.length); if (!maxLen) return;
  const labels = Array.from({length:maxLen},(_,i)=>{
    const h=hkH[i], z=zfH[i];
    return (h&&h.sprintNev)||(z&&z.sprintNev)||`S${i+1}`;
  });
  compareChartInstance = new Chart(ctx, {
    type:'line',
    data:{labels,datasets:[
      {label:'Holdkő',data:hkH.map(h=>h.total),borderColor:'#7F77DD',pointBackgroundColor:'#7F77DD',pointRadius:5,tension:0.3,fill:false},
      {label:'Zafír', data:zfH.map(h=>h.total),borderColor:'#EF9F27',pointBackgroundColor:'#EF9F27',pointRadius:5,tension:0.3,fill:false},
      {label:'Elvárás',data:Array(Math.max(labels.length,2)).fill(85),borderColor:'#dc2626',borderDash:[4,3],pointRadius:0,fill:false,borderWidth:1.5},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{y:{min:50,max:105,grid:{color:'#f0f0ec'}}},
      plugins:{legend:{display:false}}}
  });
}

// ─── GuideTab ─────────────────────────────────────────────────────────────────
function renderGuideTab() {
  const pp=[
    {icon:'💰',name:'Pénzes arány',w:30,desc:'Sprint szintű tény/terv arány alapján 0–100 pont. Göngyölt % is bevihető.'},
    {icon:'⚙️',name:'Termelés/támogatás arány',w:20,desc:'60% alatti sprint érték automatikus PIROS státuszt vált ki.'},
    {icon:'📋',name:'Elszámolási fegyelem',w:10,desc:'Késedelmes elszámolás / számlázás: 1 db → −50% | ≥2 db → KO'},
    {icon:'🔍',name:'Munkaminőség',w:15,desc:'Bevezetési: 1-2 db 80% alatt → −50% | ≥3 db 80% alatt vagy ≥1 db 60% alatt → KO<br>Support (80% alatt <em>és</em> sprintben >2 óra ráfordítás): 1-2 db → −50% | ≥3 db → −100%'},
    {icon:'🎯',name:'Tervezési pontosság',w:10,desc:'El nem készült kiemelt → KO · Kikerült/el nem készült óra >10% → −50% per tétel'},
    {icon:'📌',name:'Feladatrendezettség',w:15,desc:'0 hp → 100 pont · 1–3 hp → 50 pont · ≥4 hp → KO<br>Hibák: lejárt feldolg. (1hp/db), felügyelt >25db (1hp), megoldási javaslat (2hp), megkezdett >25db (1hp), betervezett kérés >3db (1hp), projekt kérés nélkül (1hp/db), probléma-sürgető (2hp), naptárkocka &lt;90% (1hp)'},
    {icon:'🔓',name:'Ügyvezetői korrekció',w:0,desc:'Ügyvezetői jóváhagyással bónusz % adható. A korrekció a számított ponthoz adódik hozzá (pl. 78+10=88). Dokumentálás kötelező.'},
    {icon:'📅',name:'Negyedév-kezelés',w:0,desc:'Minden negyedév (tavasz/nyár/ősz/tél) önálló sprintsorral rendelkezik. Lezárt negyedévek csak olvashatók. Új negyedévet a "＋ Új negyedév" gombbal hozz létre – az előző adatok megmaradnak.'},
  ];
  return pp.map(p=>`
    <div class="card" style="margin-bottom:8px">
      <div style="font-weight:600;margin-bottom:4px">${p.icon} ${p.name}${p.w?' <span style="color:#888;font-weight:400">('+p.w+'%)</span>':''}</div>
      <div style="font-size:12px;color:#555;line-height:1.8">${p.desc}</div>
    </div>`).join('') + `
  <div class="card" style="background:#fffbeb;border:1px solid #fde68a">
    <div style="font-weight:600;margin-bottom:4px">📊 Negyedéves cél</div>
    <div style="font-size:12px;color:#555">7 sprint · Max 700 pont · Elvárás: 595 pont (85%) · ≥85p → zöld · 70–84p → sárga · &lt;70p → piros</div>
  </div>`;
}

// ─── Render engine ────────────────────────────────────────────────────────────
function renderTabBar() {
  const tabs=[{key:'holdko',label:'🟣 Holdkő'},{key:'zafir',label:'🟠 Zafír'},{key:'compare',label:'Összehasonlítás'},{key:'guide',label:'Útmutató'}];
  const bar=document.getElementById('tabBar');
  bar.innerHTML=tabs.map(t=>`<button class="tab-btn${activeTab===t.key?' active':''}" data-tab="${t.key}">${t.label}</button>`).join('');
  bar.onclick=e=>{const tab=e.target.dataset.tab;if(tab&&tab!==activeTab){activeTab=tab;render();}};
}

function render() {
  renderTabBar();
  renderQtrBar();
  const el=document.getElementById('tabContent');
  if (activeTab==='holdko'||activeTab==='zafir') {
    el.innerHTML=renderTeamTab(activeTab);
  } else if (activeTab==='compare') {
    el.innerHTML=renderCompareTab();
    requestAnimationFrame(()=>initChart());
  } else {
    el.innerHTML=renderGuideTab();
  }
  setupContentEvents();
}

// Csak select/legördülő mezők – ezeknél nincs gépelés, azonnal frissíthetők
const liveReRender = new Set([
  'kiemeltElNemKeszult',
  'lejaMegoldasi','problemaSurgeto',
  'uvLelkes','uvSzabaly',
]);
// Szám- és szövegmezők – csak blur (change) után frissít, gépelés közben nem
const changeOnlyReRender = new Set([
  'kesedelmasElszamolasDb','szamlaKesedelemDb',
  'bevDb80','bevDb60','suppDb80',
  'naptarKocka',
  'lejaFeldolg','lejaFelug','lejaMegkezdett','lejaBetery','projKeres',
  'uvKorrekcioPct',
  'tervezettOsszesen','kikerultOra','elNemKeszultOra',
  'penzesAny','penzesTerv','penzesGongyolt',
  'termelesTamAny','termelesTamTerv','termelesTamGongyolt',
]);

function setupContentEvents() {
  const content=document.getElementById('tabContent');
  if (content._eventsReady) return;
  content._eventsReady = true;

  content.addEventListener('input',e=>{
    const field=e.target.dataset.field;
    const team=activeTab;
    if(field&&(team==='holdko'||team==='zafir')){ forms[team][field]=e.target.value; if(liveReRender.has(field)) render(); }
  });
  content.addEventListener('change',e=>{
    const field=e.target.dataset.field;
    const team=activeTab;
    if(field&&(team==='holdko'||team==='zafir')){ forms[team][field]=e.target.value; if(liveReRender.has(field)||changeOnlyReRender.has(field)) render(); }
  });

  content.addEventListener('click',async e=>{
    const action=e.target.closest('[data-action]')?.dataset.action;
    const t=e.target.closest('[data-team]')?.dataset.team;
    if(!action||!t) return;
    if(action==='save'){
      const f=forms[t];
      if(!f.sprintNev){alert('Add meg a sprint nev\u00e9t!');return;}
      if((parseFloat(f.uvKorrekcioPct)||0)>0&&!f.uvKivel){
        if(!confirm('\u00dcgyvezet\u0151i korrekci\u00f3 van megadva, de nincs megadva kivel egyeztetve. Folytatod?')) return;
      }
      const btn=document.getElementById(`saveBtn-${t}`);
      if(btn) btn.disabled=true;
      const result=calcScore(f);
      lastResults[t]=result;
      const entry={...f,...result,savedAt:new Date().toISOString()};
      const qtr=quartersData[activeQuarterKey];
      if(t==='holdko') qtr.hk=[...qtr.hk,entry];
      else qtr.zf=[...qtr.zf,entry];
      forms[t]={...emptyForm};
      render();
      await saveToGitHub();
    }
    if(action==='clear'){
      forms[t]={...emptyForm};
      lastResults[t]=null;
      render();
    }
  });
}

document.getElementById('syncBar').addEventListener('click',async e=>{
  const btn=e.target.closest('button');
  if(!btn) return;
  if(btn.dataset.action==='refresh'){await loadFromGitHub();render();}
  if(btn.dataset.action==='account'){showAuthModal(()=>{loadFromGitHub().then(()=>render());});}
});

// ─── Init ──────────────────────────────────────────────────────────────────────────────
(async()=>{
  await loadFromGitHub();
  renderTabBar();
  render();
  const bar=document.getElementById('syncBar');
  const btnR=document.createElement('button');
  btnR.className='btn-sm';btnR.textContent='\u21bb Friss\u00edt\u00e9s';btnR.dataset.action='refresh';
  bar.appendChild(btnR);
  const btnA=document.createElement('button');
  btnA.className='btn-sm';btnA.textContent='\ud83d\udd11 Fi\u00f3k';btnA.dataset.action='account';
  btnA.title='Confluence bejelentkez\u00e9si adatok m\u00f3dos\u00edt\u00e1sa';
  bar.appendChild(btnA);
})();
</script>
